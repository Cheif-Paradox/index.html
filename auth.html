<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Access Vault</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: #1e293b;
  padding: 2.5rem;
  border-radius: 16px;
  width: 350px;
  text-align: center;
}

input {
  width: 100%;
  padding: 0.9rem;
  margin: 0.6rem 0;
  border-radius: 8px;
  border: none;
}

button {
  width: 100%;
  padding: 0.9rem;
  margin-top: 1rem;
  border-radius: 8px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

.primary { background: #6366f1; color: white; }
.secondary { background: #334155; color: white; }

.tabs button {
  width: 48%;
  margin: 0 1%;
}

.message {
  margin-top: 1rem;
  font-weight: bold;
}
</style>
</head>
<body>

<div class="container">
  <h2>Unlock Vault</h2>

  <div class="tabs">
    <button onclick="switchTab('signup')" class="secondary">Sign Up</button>
    <button onclick="switchTab('login')" class="secondary">Login</button>
  </div>

  <form id="signup-form">
    <input type="email" id="signup-email" placeholder="yourname@gmail.com" required>
    <input type="password" id="signup-password" placeholder="Password (8+ chars)" required>
    <input type="password" id="signup-confirm" placeholder="Confirm password" required>
    <button type="submit" class="primary">Create Account</button>
  </form>

  <form id="login-form" style="display:none;">
    <input type="email" id="login-email" placeholder="yourname@gmail.com" required>
    <input type="password" id="login-password" placeholder="Password" required>
    <button type="submit" class="primary">Login</button>
  </form>

  <div id="message" class="message"></div>
</div>

<script>
let users = JSON.parse(localStorage.getItem('projectUsers')) || {};
let currentTab = 'signup';

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('signup-form').style.display = tab === 'signup' ? 'block' : 'none';
  document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
}

function showMessage(text, color="white") {
  const msg = document.getElementById('message');
  msg.textContent = text;
  msg.style.color = color;
}

// Signup
document.getElementById('signup-form').addEventListener('submit', function(e){
  e.preventDefault();

  const email = document.getElementById('signup-email').value.trim().toLowerCase();
  const password = document.getElementById('signup-password').value;
  const confirm = document.getElementById('signup-confirm').value;

  if(!email.endsWith('@gmail.com')) return showMessage("Use Gmail only", "red");
  if(password.length < 8) return showMessage("Password 8+ chars", "red");
  if(password !== confirm) return showMessage("Passwords mismatch", "red");
  if(users[email]) return showMessage("Account exists", "red");

  users[email] = { password: btoa(password) };
  localStorage.setItem('projectUsers', JSON.stringify(users));

  showMessage("Account created! Login now.", "lightgreen");
  switchTab('login');
});

// Login
document.getElementById('login-form').addEventListener('submit', function(e){
  e.preventDefault();

  const email = document.getElementById('login-email').value.trim().toLowerCase();
  const password = document.getElementById('login-password').value;

  if(!users[email] || users[email].password !== btoa(password)) {
    return showMessage("Wrong credentials", "red");
  }

  localStorage.setItem('currentVoiceUser', email);
  showMessage("Login successful! Redirecting back...The project is now accessible.", "lightgreen");

  setTimeout(() => {
    window.location.href = "index.html";
  }, 1000);
});
</script>

</body>
</html>
