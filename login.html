<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Secret Project Access</title>
  <meta name="description" content="Access the secret project vault">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #ffffff;
      --text: #0f172a;
      --text-light: #334155;
      --gray: #64748b;
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --border: #e2e8f0;
      --success: #10b981;
      --error: #ef4444;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --text: #f1f5f9;
        --text-light: #cbd5e1;
        --gray: #94a3b8;
        --border: #334155;
      }
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 2.5rem;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(255,255,255,0.4);
      backdrop-filter: blur(8px);
      box-shadow: 0 20px 40px -12px rgba(0,0,0,0.12);
    }
    @media (prefers-color-scheme: dark) { 
      .login-container { background: rgba(15, 23, 42, 0.6); } 
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--gray);
      text-decoration: none;
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--primary); }
    h1 { 
      font-size: 1.8rem; 
      margin-bottom: 0.5rem; 
      text-align: center;
    }
    .subtitle { 
      color: var(--text-light); 
      text-align: center; 
      margin-bottom: 2rem;
      font-size: 1rem;
    }
    .auth-tabs { 
      display: flex; 
      gap: 0.5rem; 
      margin-bottom: 1.5rem; 
      background: var(--border);
      padding: 0.25rem;
      border-radius: 12px;
    }
    .auth-tab { 
      flex: 1; 
      padding: 0.8rem; 
      border: none; 
      background: transparent; 
      font-weight: 500; 
      cursor: pointer; 
      border-radius: 10px; 
      transition: all 0.2s;
      color: var(--text-light);
    }
    .auth-tab.active { 
      background: var(--primary); 
      color: white; 
      box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
    }
    .auth-form { 
      display: flex; 
      flex-direction: column; 
      gap: 1.2rem; 
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    label {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-light);
    }
    input {
      padding: 1rem; 
      border-radius: 12px; 
      border: 2px solid var(--border);
      background: var(--bg); 
      color: var(--text); 
      font-size: 1rem;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus {
      outline: none; 
      border-color: var(--primary); 
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }
    .btn { 
      display: inline-block; 
      padding: 1rem 1.8rem; 
      border-radius: 12px; 
      font-weight: 600; 
      text-decoration: none; 
      transition: all 0.2s; 
      border: none; 
      cursor: pointer; 
      font-size: 1rem;
      font-family: inherit;
    }
    .btn-primary { 
      background: var(--primary); 
      color: white; 
      width: 100%;
    }
    .btn-primary:hover { 
      background: var(--primary-dark); 
      transform: translateY(-1px); 
    }
    .login-message { 
      padding: 0.8rem; 
      border-radius: 8px; 
      font-weight: 500; 
      text-align: center; 
      display: none;
      font-size: 0.95rem;
    }
    .login-message.success { 
      background: rgba(16, 185, 129, 0.15); 
      color: var(--success); 
      border: 1px solid var(--success); 
      display: block; 
    }
    .login-message.error { 
      background: rgba(239, 68, 68, 0.15); 
      color: var(--error); 
      border: 1px solid var(--error); 
      display: block; 
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
      20%, 40%, 60%, 80% { transform: translateX(5px); }
    }
    .shake { animation: shake 0.5s; }
  </style>
</head>
<body>
  <div class="login-container">
    <a href="index.html" class="back-link">← Back to Portfolio</a>
    
    <h1>🔐 Secret Vault Access</h1>
    <p class="subtitle">Create account or login to reveal the project</p>
    
    <div id="auth-message" class="login-message"></div>
    
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('signup')">Sign Up</button>
      <button class="auth-tab" onclick="switchTab('login')">Login</button>
    </div>

    <form class="auth-form" id="signup-form">
      <div class="form-group">
        <label for="signup-email">Email (Gmail only)</label>
        <input type="email" id="signup-email" placeholder="yourname@gmail.com" required>
      </div>
      <div class="form-group">
        <label for="signup-password">Password (8+ characters)</label>
        <input type="password" id="signup-password" placeholder="Create password" minlength="8" required>
      </div>
      <div class="form-group">
        <label for="signup-confirm">Confirm Password</label>
        <input type="password" id="signup-confirm" placeholder="Confirm password" required>
      </div>
      <button type="submit" class="btn btn-primary">Create Account</button>
    </form>

    <form class="auth-form" id="login-form" style="display: none;">
      <div class="form-group">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="yourname@gmail.com" required>
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn btn-primary">Login</button>
    </form>
  </div>

  <script>
    let users = JSON.parse(localStorage.getItem('projectUsers')) || {};
    let isSignup = true;

    function switchTab(tab) {
      isSignup = tab === 'signup';
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('signup-form').style.display = isSignup ? 'flex' : 'none';
      document.getElementById('login-form').style.display = isSignup ? 'none' : 'flex';
      hideMessage();
    }

    function showMessage(text, type) {
      const msgEl = document.getElementById('auth-message');
      msgEl.textContent = text;
      msgEl.className = `login-message ${type}`;
    }

    function hideMessage() {
      const msgEl = document.getElementById('auth-message');
      msgEl.className = 'login-message';
      msgEl.textContent = '';
    }

    // Signup
    document.getElementById('signup-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('signup-email').value.trim().toLowerCase();
      const password = document.getElementById('signup-password').value;
      const confirm = document.getElementById('signup-confirm').value;

      if (!email.endsWith('@gmail.com')) {
        showMessage('Please use a Gmail address', 'error');
        return;
      }
      if (password.length < 8) {
        showMessage('Password must be 8+ characters', 'error');
        return;
      }
      if (password !== confirm) {
        showMessage('Passwords do not match', 'error');
        return;
      }
      if (users[email]) {
        showMessage('Account already exists!', 'error');
        return;
      }

      users[email] = { 
        email, 
        password: btoa(password), 
        created: new Date().toISOString() 
      };
      localStorage.setItem('projectUsers', JSON.stringify(users));
      
      showMessage('Account created! Redirecting...', 'success');
      
      setTimeout(() => {
        localStorage.setItem('currentVoiceUser', email);
        window.location.href = 'index.html';
      }, 1500);
    });

    // Login
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('login-email').value.trim().toLowerCase();
      const password = document.getElementById('login-password').value;

      if (!users[email] || users[email].password !== btoa(password)) {
        showMessage('Invalid email or password', 'error');
        document.querySelector('.login-container').classList.add('shake');
        setTimeout(() => document.querySelector('.login-container').classList.remove('shake'), 500);
        return;
      }

      showMessage('Login successful! Redirecting...', 'success');
      
      setTimeout(() => {
        localStorage.setItem('currentVoiceUser', email);
        window.location.href = 'index.html';
      }, 1200);
    });
  </script>
</body>
</html>
